name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build --sizes

      - name: Run Forge unit tests
        run: |
          forge test -vvv --match-contract SwapAppTest
          forge test -vvv --match-contract V3LiquidityStrategyTest
          forge test -vvv --match-contract V3PriceLimitHelperTest
          forge test -vvv --match-contract V3QuoteHelperTest
          forge test -vvv --match-contract V3RangeHelperTest

      - name: Run Forge fork tests
        if: ${{ secrets.ARBITRUM_RPC_URL != '' }}
        env:
          ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
        run: forge test -vvv --match-contract SwapAppForkArbitrumTest
